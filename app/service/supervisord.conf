[supervisord]
nodaemon=false
logfile=logs/supervisord.log
logfile_maxbytes=5MB
logfile_backups=3
pidfile=logs/supervisord.pid
loglevel=info

[unix_http_server]
file=logs/supervisord.sock

[supervisorctl]
serverurl=unix://logs/supervisord.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:vision-service]
command=python main.py
directory=%(here)s
autostart=true
autorestart=true
startretries=10
stopwaitsecs=5
stdout_logfile=logs/vision-service.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=logs/vision-service-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3
environment=PYTHONUNBUFFERED="1"

[program:webrtc-backend]
command=python main.py
directory=%(here)s/../webrtc-backend
autostart=true
autorestart=true
startretries=10
stopwaitsecs=5
stdout_logfile=%(here)s/../webrtc-backend/logs/webrtc-backend.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=%(here)s/../webrtc-backend/logs/webrtc-backend-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3
environment=PYTHONUNBUFFERED="1"
